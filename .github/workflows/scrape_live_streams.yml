name: Scrape Live Streams and Commit

on:
  schedule:
    - cron: '0,30 * * * *' # every 30 minutes (UTC)
  workflow_dispatch: {}

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run scraper
        run: |
          python3 scripts/scrape_live_streams.py

      - name: Commit generated file if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          FILE=output.json
          if [ ! -f "$FILE" ]; then
            echo "$FILE not present; nothing to commit"
            exit 0
          fi
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add "$FILE" || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update output.json from scraper [skip ci]"
          git push
