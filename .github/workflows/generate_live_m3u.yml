name: Generate Live M3U

on:
  schedule:
    - cron: '0,30 * * * *' # every 30 minutes (UTC)
  workflow_dispatch: {}

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true # allow the workflow to push commits

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run generator script
        run: |
          python3 scripts/generate_live_m3u.py

      - name: Commit generated file if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          FILE=generated_live.m3u
          if [ ! -f "$FILE" ]; then
            echo "$FILE not present; nothing to commit"
            exit 0
          fi
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add "$FILE" || true
          # if there are staged changes, commit and push
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update generated_live.m3u [skip ci]"
          git push
